
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fliz Indumentaria</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ff9900;
        }

        .hero {
            background-color: #222;
            color: white;
            padding: 50px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .productos {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .producto {
            background-color: white;
            padding: 15px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .producto img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background-color: #111;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Fliz Indumentaria</h1>
    <p>Moda urbana y estilo propio</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Contacto</a>
</nav>

<section class="hero">
    <h2>Nueva colección 2026</h2>
    <p>Descubrí lo último en tendencias</p>
</section>

<div class="container">
    <h2 style="text-align:center;">Nuestros Productos</h2>

    <div class="productos">
        <div class="producto">
            <img src="https://via.placeholder.com/200" alt="Remera">
            <h3>Remera Urbana</h3>
            <p>$15.000</p>
        </div>

        <div class="producto">
            <img src="https://via.placeholder.com/200" alt="Buzo">
            <h3>Buzo Oversize</h3>
            <p>$25.000</p>
        </div>

        <div class="producto">
            <img src="https://via.placeholder.com/200" alt="Pantalón">
            <h3>Pantalón Jogger</h3>
            <p>$20.000</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Fliz Indumentaria - Todos los derechos reservados</p>
</footer>

</body>
</html>
